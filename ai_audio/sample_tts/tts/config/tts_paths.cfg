# TTS path configuration
# Edit this file to point to your QNN model and library files.
# Lines beginning with '#' and blank lines are ignored.

# QNN SDK include directory (used at compile time)
qnn_headers_path  = /usr/include/QNN

# BERT tokenizer and normalizer binaries
tokenizer_path    = /home/ubuntu/qnn_bin/bert_en_tokenizer.bin
normalizer_path   = /home/ubuntu/qnn_bin/bert_normalizer.bin

# QNN model binaries
bert_model_path    = /home/ubuntu/qnn_bin/bert_wrapper.bin
encoder_model_path = /home/ubuntu/qnn_bin/encoder.bin
flow_model_path    = /home/ubuntu/qnn_bin/flow.bin
decoder_model_path = /home/ubuntu/qnn_bin/decoder.bin

# QNN runtime libraries
backend_lib_path = /usr/lib/libQnnHtp.so
system_lib_path  = /usr/lib/libQnnSystem.so

# Optional audio parameters (defaults shown)
# speech_rate = 1.0
# sample_rate = 44100
